<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 500px;
    background: #0A1628;
    font-family: 'Outfit', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Glow */
  body::before {
    content: '';
    position: absolute;
    top: -100px;
    left: 30%;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(0, 208, 156, 0.12);
    filter: blur(100px);
  }

  .content {
    display: flex;
    align-items: center;
    gap: 60px;
    z-index: 1;
  }

  .text-side {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    max-width: 440px;
  }

  .logo { height: 70px; margin-bottom: 16px; }

  h1 {
    font-size: 38px;
    font-weight: 700;
    color: #E8ECF1;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  h1 .accent { color: #00D09C; }

  .tagline {
    font-family: 'Amiri', serif;
    font-size: 20px;
    color: #00D09C;
    margin-bottom: 8px;
  }

  .tagline-en {
    font-size: 14px;
    color: #7A8BA0;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .phones {
    display: flex;
    gap: 20px;
    perspective: 1000px;
  }

  .phone {
    width: 170px;
    height: 360px;
    border-radius: 22px;
    border: 2.5px solid rgba(0, 208, 156, 0.3);
    overflow: hidden;
    background: #0E1E34;
    box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 30px rgba(0,208,156,0.06);
  }

  .phone.left { transform: rotateY(10deg) rotateZ(-1deg); }
  .phone.right { transform: rotateY(-10deg) rotateZ(1deg); }

  .phone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="text-side">
      <img src="header_dark.png" alt="Qawama" class="logo">
      <div class="tagline">إنفاق متوازن، حياة مباركة</div>
      <div class="tagline-en">Balanced spending, blessed living</div>
      <h1>Smart budgeting that <span class="accent">understands</span> your spending</h1>
    </div>
    <div class="phones">
      <div class="phone left">
        <img src="screen1.jpeg" alt="Dashboard">
      </div>
      <div class="phone right">
        <img src="screen2.jpeg" alt="Categories">
      </div>
    </div>
  </div>
</body>
</html>
